<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshna · Full Stack + Power BI</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 1.5rem;
            padding-top: 85px; /* space for fixed nav */
        }

        /* ---------- FIXED NAVIGATION BAR ---------- */
        .nav-wrapper {
            width: 100%;
            max-width: 1280px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            flex-wrap: wrap;
            border-bottom: 1px solid #eef2f6;
            background: white;
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-left {
            font-size: 1.7rem;
            font-weight: 700;
            color: #2563eb;
            letter-spacing: -0.02em;
        }

        .nav-right {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .nav-item {
            font-size: 1rem;
            font-weight: 500;
            color: #1e3b5c;
            text-decoration: none;
            transition: 0.15s;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
        }

        .nav-item:hover {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }

        /* ---------- MAIN CONTENT - VERTICALLY CENTERED IN REMAINING SPACE ---------- */
        .main-content {
            max-width: 1280px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 2.8rem;
            align-items: center;
            background: transparent;
            /* ----- VERTICAL CENTERING MAGIC ----- */
            flex: 1 0 auto;        /* allows main-content to grow and fill space */
            margin: 0;            /* remove all vertical margins */
            align-content: center; /* center grid content vertically */
        }

        /* LEFT: IMAGE - CIRCLE */
        .image-side {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-frame {
            background: white;
            border-radius: 50%;
            padding: 0rem;
            /*box-shadow: 0 30px 35px -10px rgba(34, 58, 94, 0.15);*/
            border: 2px solid white;
            animation: float 8s infinite ease-in-out;
            max-width: 320px;
            width: 100%;
            aspect-ratio: 1/1;
        }

        .img-frame img {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            aspect-ratio: 1/1;
            background: #f0f4fa;
            border: 4px solid white;
        }

        /* RIGHT: CONTENT */
        .content-side {
            display: flex;
            flex-direction: column;
        }

        .greeting-line {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 0.2rem;
        }

        .greeting-text {
            color: #0a1c2f;
        }

        .name-highlight {
            color: #2563eb;
            font-weight: 800;
            margin-left: 0.2rem;
        }

        .fullstack-text {
            font-size: 1.6rem;
            font-weight: 500;
            color: #2c4c6e;
            margin-top: 0.1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 2px solid rgba(37,99,235,0.2);
            padding-bottom: 0.6rem;
            width: fit-content;
        }

        .fullstack-text i {
            color: #2563eb;
            font-size: 1.7rem;
        }

        /* paragraph styling */
        .content-side p {
            font-size: 1.1rem;
            color: #334e68;
            margin: 0.8rem 0 0.5rem 0;
            line-height: 1.6;
            max-width: 500px;
        }

        /* CONTACT & PROJECTS BUTTON ROW */
        .contact-project-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-top: 1.2rem;
            align-items: center;
            border-top: 2px dashed #dce5ec;
            padding-top: 1.5rem;
        }

        /* Button style (used for both <div> and <a>) */
        .btn-secondary {
            background: transparent;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            border: 2px solid #1e3b5c;
            color: #1e3b5c;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            cursor: pointer;           /* changed from default to pointer */
            text-decoration: none;      /* remove underline from <a> */
            background: white;
        }

        .btn-secondary i {
            color: #0f2b3c;
        }

        .btn-secondary:hover {
            background: #1e3b5c;
            color: white;
        }
        .btn-secondary:hover i {
            color: white;
        }

        /* ---------- BOTTOM: CONNECT SECTION (fixed to bottom) ---------- */
        .connect-section {
            max-width: 1280px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 0 1.5rem 0;
            border-top: 1px solid #eef2f6;
            background: white;
            margin-top: auto;    /* pushes section to bottom */
            flex-shrink: 0;      /* prevents shrinking */
        }

        .connect-text {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.8rem;
            font-weight: 600;
            color: #0a1c2f;
            margin-bottom: 1.2rem;
        }

        .connect-text i {
            color: #2563eb;
            font-size: 2rem;
        }

        .social-links {
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #1e3b5c;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            color: #2563eb;
            transform: translateY(-5px);
        }

        /* animation */
        @keyframes float {
            0% { border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%; transform: translateY(0); }
            50% { border-radius: 45% 55% 35% 65% / 55% 45% 55% 45%; transform: translateY(-6px); }
            100% { border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%; transform: translateY(0); }
        }

        /* responsive */
        @media (max-width: 900px) {
            .main-content { 
                grid-template-columns: 1fr; 
                gap: 1.8rem;
                padding: 1rem 0;
            }
            .image-side { max-width: 280px; margin: 0 auto; }
            .greeting-line { font-size: 2.4rem; }
            .fullstack-text { font-size: 1.4rem; }
            .nav-wrapper { flex-direction: column; gap: 0.5rem; }
            body { padding-top: 120px; }
        }

        @media (max-width: 600px) {
            .nav-right { gap: 1rem; justify-content: center; }
            .greeting-line { font-size: 2rem; }
            body { padding-top: 140px; }
        }

        @media (max-width: 500px) {
            body { padding-left: 1rem; padding-right: 1rem; padding-top: 160px; }
            .greeting-line { font-size: 1.8rem; }
            .fullstack-text { font-size: 1.2rem; }
            .btn-secondary { padding: 0.6rem 1.2rem; }
            .social-links { gap: 1.5rem; }
            .social-icon { font-size: 1.8rem; }
        }
    </style>
</head>
<body class="home">
    <!-- FIXED NAVIGATION BAR -->

        <div class="nav-left">Joshna</div>
        <div class="nav-right">

    <div class="main-content">

        <div class="image-side">

        </div>
        <div class="social-links">

            </a>
            <!-- LinkedIn -->
            <a href="https://linkedin.com/in/joshna" target="_blank" class="social-icon" title="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <!-- Instagram -->
            <a href="https://instagram.com/joshna" target="_blank" class="social-icon" title="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <!-- WhatsApp -->
            <a href="https://wa.me/1234567890" target="_blank" class="social-icon" title="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <!-- Facebook -->
            <a href="https://facebook.com/joshna" target="_blank" class="social-icon" title="Facebook">
                <i class="fab fa-facebook"></i>
            </a>
        </div>
    </div>
</body>
</html>
